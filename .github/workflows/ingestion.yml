name: Daily Ingestion

on:
  schedule:
    # run each day at 12:00 UTC (morning in US)
    - cron: '0 12 * * *'
  workflow_dispatch: {}

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Nightly Savant refresh
        run: |
          # run even off-season; the script itself exits gracefully
          python scripts/nightly_savant_refresh.py

      - name: Fetch historical Savant leaderboards (all seasons)
        run: |
          # nightly_savant_refresh.py above only covers the CURRENT season.
          # extra_features.py's savant_team_features/savant_sp_features need
          # multiple PRIOR seasons too (they shift season+1 to avoid
          # lookahead bias). data_files/raw/ is gitignored (not committed),
          # so each workflow run starts fresh — re-fetch every time. This is
          # cheap: 2 HTTP requests total for the whole 2020-2026 range.
          python -c "from src.ingestion.savant_leaderboard import fetch_all_savant_leaderboards; fetch_all_savant_leaderboards()"

      - name: Refresh current-season retrosheet data
        run: |
          # update 2026 game logs, batting, pitching, and player registry
          python scripts/fetch_current_season.py

      - name: Refresh reference data (Guts!, park factors, Chadwick)
        run: |
          python scripts/fetch_reference_data.py

      - name: Run ingestion (season-aware)
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          THERUNDOWN_API_KEY: ${{ secrets.THERUNDOWN_API_KEY }}
        run: |
          python - <<'PYTHON'
          from datetime import datetime
          import sys
          from src.ingestion.season import in_season

          if not in_season(datetime.utcnow()):
              print('Outside baseball season; skipping ingestion.\n' +
                    'Season months are Mar–Nov and year must be within config range.')
              sys.exit(0)

          # Morning pull removed — daily picks pipeline handles odds fetch.
          # afternoon_update is omitted to stay within the 500 req/month quota.
          from src.ingestion.scheduler import overnight_results

          overnight_results()
          PYTHON
      - name: Pre-compute aggregated datasets
        run: python scripts/precompute_data.py

      - name: Commit precomputed data and current-season supplements
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add data_files/processed/
          git add data_files/retrosheet/*_current.parquet 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update precomputed data and season supplements [skip ci]"
          git push
        continue-on-error: true

      - name: Train models (season-aware)
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          THERUNDOWN_API_KEY: ${{ secrets.THERUNDOWN_API_KEY }}
        run: |
          python - <<'PYTHON'
          from datetime import datetime
          import sys
          from src.ingestion.season import in_season

          if not in_season(datetime.utcnow()):
              print('Outside baseball season; skipping model training.')
              sys.exit(0)

          # use the helper script
          from scripts.train_models import main as train_main
          train_main()
          PYTHON

      - name: Run daily picks pipeline (season-aware)
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          THERUNDOWN_API_KEY: ${{ secrets.THERUNDOWN_API_KEY }}
        run: |
          python - <<'PYTHON'
          from datetime import datetime
          import sys
          from src.ingestion.season import in_season

          if not in_season(datetime.utcnow()):
              print('Outside baseball season; skipping picks pipeline.')
              sys.exit(0)

          from src.picks.daily_pipeline import run_daily_pipeline
          run_daily_pipeline()
          PYTHON
        continue-on-error: true

      - name: Export best bets for Sports Picks Grid
        run: python scripts/export_best_bets.py
        continue-on-error: true
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Commit best_bets_today.json
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add data_files/best_bets_today.json
          git diff --staged --quiet || git commit -m "chore: update best_bets_today [skip ci]"
          git push
        continue-on-error: true
